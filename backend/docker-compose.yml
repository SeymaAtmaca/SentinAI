version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mg-api-dev
    restart: unless-stopped
    ports:
      - "8001:8000"          # 🔑 Çakışma çözüldü: Host 8001 → Container 8000
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-passpostgre34}@db:5432/modelguardian
      - REDIS_URL=redis://:${REDIS_PASSWORD:-passredis34}@redis:6379/0
      - APP_ENV=development
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 1G }
        reservations: { cpus: "0.5", memory: 256M }
    networks: [mg-net]

  db:
    image: postgres:15-alpine
    container_name: mg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-passdb34}
      POSTGRES_DB: modelguardian
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy: { resources: { limits: { cpus: "1.0", memory: 512M } } }
    networks: [mg-net]

  redis:
    image: redis:7-alpine
    container_name: mg-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-passredis34}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes: [redisdata:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-passredis34}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks: [mg-net]

volumes:
  pgdata: { driver: local }
  redisdata: { driver: local }

networks:
  mg-net: { driver: bridge }